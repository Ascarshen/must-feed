name: Dinner Reminder

on:
  schedule:
    # Multiple UTC attempts; the script posts at most once per Denmark local date.
    - cron: "0 16 * * *"
    - cron: "30 16 * * *"
    - cron: "0 17 * * *"
    - cron: "30 17 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  TARGET_USERNAME: XYUnknown
  TARGET_DISPLAY_NAME: Xueying
  TARGET_TIME_ZONE: Europe/Copenhagen
  ISSUE_NUMBER: "2"
  ISSUE_TITLE: Daily dinner reminder for Xueying
  INCIDENT_APOLOGY_DATE: "2026-04-28"
  INCIDENT_APOLOGY_TEXT: "I remain confused by my drunken behavior yesterday. @Ascarshen has already hung me up and beaten me for it. I cannot guarantee it will never happen again, though, because getting beaten was a little enjoyable."
  OPENAI_BASE_URL: https://api.ikuncode.cc
  OPENAI_MODEL: gpt-5.2

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Post daily mention
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const eventName = context.eventName;
            const now = new Date();
            const targetDisplayName = process.env.TARGET_DISPLAY_NAME;
            const targetTimeZone = process.env.TARGET_TIME_ZONE || "Europe/Copenhagen";

            function formatTargetDate(date) {
              const target = new Intl.DateTimeFormat("en-GB", {
                timeZone: targetTimeZone,
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                hourCycle: "h23",
              }).formatToParts(date);

              const parts = Object.fromEntries(
                target
                  .filter((part) => part.type !== "literal")
                  .map((part) => [part.type, part.value]),
              );

              return {
                date: `${parts.year}-${parts.month}-${parts.day}`,
                hour: Number(parts.hour),
                minute: parts.minute,
              };
            }

            function previousTargetDate(localDate) {
              const noonUtc = new Date(`${localDate}T12:00:00Z`);
              noonUtc.setUTCDate(noonUtc.getUTCDate() - 1);
              return formatTargetDate(noonUtc).date;
            }

            function commentPlainText(comment) {
              return (comment.body || "")
                .replace(/<!--[\s\S]*?-->/g, "")
                .split(/\r?\n/)
                .filter((line) => !line.trimStart().startsWith(">"))
                .join("\n")
                .replace(/\s+/g, " ")
                .trim();
            }

            function compactComment(comment) {
              const body = commentPlainText(comment);
              const clipped = body.length > 520 ? `${body.slice(0, 517)}...` : body;
              return {
                author: comment.user?.login || "unknown",
                date: formatTargetDate(new Date(comment.created_at)).date,
                body: clipped,
              };
            }

            function getReminderDate(body) {
              const match = /<!--\s*dinner-reminder:(\d{4}-\d{2}-\d{2})\s*-->/.exec(body || "");
              return match ? match[1] : null;
            }

            function getDinnerState(body) {
              const match = /<!--\s*dinner-state:([A-Za-z0-9+/=]+)\s*-->/.exec(body || "");
              if (!match) {
                return null;
              }

              try {
                return JSON.parse(Buffer.from(match[1], "base64").toString("utf8"));
              } catch {
                return null;
              }
            }

            function createDinnerStateMarker(state) {
              const encoded = Buffer.from(JSON.stringify(state), "utf8").toString("base64");
              return `<!-- dinner-state:${encoded} -->`;
            }

            function getCommentTime(comment) {
              const time = new Date(comment.created_at).getTime();
              return Number.isFinite(time) ? time : 0;
            }

            function summarizeDayStatus(date, replies, replyAnalysis = null) {
              const status = replyAnalysis?.status || (replies.length ? "unclear" : "no_reply");
              const latestReply = replies.at(-1) || null;

              return {
                date,
                status,
                confirmed: status === "confirmed",
                replyCount: replies.length,
                latestReplyDate: latestReply?.date || null,
                latestReplyBody: latestReply?.body || null,
                mealDescription: replyAnalysis?.mealDescription || null,
                analysisSource: replyAnalysis?.source || (replies.length ? "unclassified" : "none"),
                analysisReason: replyAnalysis?.reason || null,
              };
            }

            function calculateConfirmedStreak(dinnerByDate, endDate) {
              let count = 0;
              let cursor = endDate;
              while (cursor && dinnerByDate[cursor]?.status === "confirmed") {
                count += 1;
                cursor = previousTargetDate(cursor);
              }
              return count;
            }

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function sanitizeAiReminder(text, username) {
              let result = (text || "")
                .replace(/<!--[\s\S]*?-->/g, "")
                .replace(/\r\n/g, "\n")
                .trim();

              if (!result) {
                return "";
              }

              const mention = `@${username}`;
              const mentionPattern = new RegExp(`${escapeRegExp(mention)}\\b`, "g");
              let sawMention = false;
              result = result.replace(mentionPattern, () => {
                if (!sawMention) {
                  sawMention = true;
                  return mention;
                }
                return targetDisplayName;
              });

              if (!sawMention) {
                result = `${mention} ${result}`;
              }

              return result.length > 900 ? `${result.slice(0, 897)}...` : result;
            }

            function seededChoice(items, seed) {
              let hash = 0;
              for (const char of seed) {
                hash = (hash * 31 + char.charCodeAt(0)) >>> 0;
              }
              return items[hash % items.length];
            }

            function fallbackReminder(username, localDate, confirmationSummary) {
              const titles = [
                "Dinner Bureau Case Officer",
                "Certified Bowl Participant",
                "Rice Compliance Specialist",
                "Soup Court Witness",
                "Evening Meal Field Agent",
              ];
              const missions = [
                "eat something that required a bowl, plate, or actual cooking",
                "submit one credible meal to the evening record",
                "make snacks supporting evidence, not the main report",
                "complete the ancient ritual known as dinner",
                "acquire one warm or substantial food object",
              ];
              const title = seededChoice(titles, `${localDate}:title`);
              const mission = seededChoice(missions, `${localDate}:mission`);
              const previousStatus = confirmationSummary.previousDayStatus;
              const previousReply = previousStatus?.latestReplyBody
                ? previousStatus.latestReplyBody.slice(0, 180)
                : null;
              const yesterdayLine = previousStatus?.status === "confirmed"
                ? `Previous dinner confirmed${previousReply ? `: ${previousReply}` : "."}`
                : "Previous dinner status is still unconfirmed.";

              return [
                `@${username} ${targetDisplayName}, dinner checkpoint is open.`,
                "",
                `Today's title: ${title}`,
                `Mission: ${mission}.`,
                yesterdayLine,
                `Confirmed streak: ${confirmationSummary.confirmedStreakDays || 0} day(s).`,
              ].join("\n");
            }

            function extractOutputText(responseJson) {
              if (typeof responseJson.output_text === "string") {
                return responseJson.output_text.trim();
              }

              const chunks = [];
              for (const item of responseJson.output || []) {
                for (const content of item.content || []) {
                  if (content.type === "output_text" && content.text) {
                    chunks.push(content.text);
                  }
                }
              }
              return chunks.join("\n").trim();
            }

            function parseJsonObject(text) {
              const cleaned = (text || "")
                .trim()
                .replace(/^```(?:json)?\s*/i, "")
                .replace(/\s*```$/i, "");
              const start = cleaned.indexOf("{");
              const end = cleaned.lastIndexOf("}");
              if (start === -1 || end === -1 || end < start) {
                return null;
              }

              try {
                return JSON.parse(cleaned.slice(start, end + 1));
              } catch {
                return null;
              }
            }

            function normalizeReplyAnalysis(value, replies, source) {
              const latestReplyDate = replies.length ? replies.at(-1).date : null;
              const allowedStatuses = new Set(["confirmed", "denied", "unclear", "no_reply"]);
              const allowedDates = new Set(["today", "yesterday", "unknown"]);
              const status = allowedStatuses.has(value?.status) ? value.status : "unclear";
              const confirmationDate = allowedDates.has(value?.confirmationDate)
                ? value.confirmationDate
                : "unknown";
              const confidence = Number(value?.confidence);

              return {
                status,
                confirmed: status === "confirmed",
                confirmationDate,
                mealDescription: value?.mealDescription ? String(value.mealDescription).slice(0, 120) : null,
                confidence: Number.isFinite(confidence) ? Math.max(0, Math.min(1, confidence)) : 0,
                reason: value?.reason ? String(value.reason).slice(0, 160) : null,
                replyCount: replies.length,
                latestReplyDate,
                source,
              };
            }

            function fallbackReplyAnalysis(replies) {
              if (!replies.length) {
                return normalizeReplyAnalysis(
                  {
                    status: "no_reply",
                    confirmed: false,
                    confirmationDate: "unknown",
                    confidence: 1,
                    reason: "No target replies since the latest reminder.",
                  },
                  replies,
                  "none",
                );
              }

              return normalizeReplyAnalysis(
                {
                  status: "unclear",
                  confirmed: false,
                  confirmationDate: "unknown",
                  confidence: 0,
                  reason: "LLM classification was unavailable, so the reply was not guessed.",
                },
                replies,
                "llm-unavailable",
              );
            }

            async function classifyDinnerReplies({ localDate, replies }) {
              if (!replies.length) {
                return fallbackReplyAnalysis(replies);
              }

              const apiKey = process.env.OPENAI_API_KEY;
              if (!apiKey) {
                core.info("OPENAI_API_KEY is not configured; marking replies unclear instead of guessing.");
                return fallbackReplyAnalysis(replies);
              }

              const systemPrompt = [
                "You classify target-user replies in a GitHub dinner reminder issue.",
                "Return only one JSON object and no surrounding text.",
                "Schema: {\"status\":\"confirmed|denied|unclear\",\"confirmed\":boolean,\"confirmationDate\":\"today|yesterday|unknown\",\"mealDescription\":string|null,\"confidence\":number,\"reason\":string}.",
                "The provided localDate is the dinner date being checked, usually the previous reminder date.",
                "Quoted GitHub reply text has been removed before you see the replies; classify only the target user's own words.",
                "Use confirmed only when the reply says the target ate, is eating, finished dinner, or gives concrete meal evidence.",
                "Use denied when the reply says they did not eat, skipped dinner, or have not eaten yet.",
                "Use unclear for jokes, acknowledgements, or anything without enough dinner evidence.",
                "confirmationDate is relative to localDate in the provided context.",
              ].join("\n");

              const promptData = {
                localDate,
                timeZone: targetTimeZone,
                replies,
              };

              try {
                const baseUrl = (process.env.OPENAI_BASE_URL || "https://api.openai.com").replace(/\/+$/, "");
                const response = await fetch(`${baseUrl}/v1/responses`, {
                  method: "POST",
                  headers: {
                    Authorization: `Bearer ${apiKey}`,
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({
                    model: process.env.OPENAI_MODEL || "gpt-5.2",
                    input: [
                      {
                        role: "system",
                        content: [{ type: "input_text", text: systemPrompt }],
                      },
                      {
                        role: "user",
                        content: [
                          {
                            type: "input_text",
                            text: [
                              "Classify these target-user replies.",
                              JSON.stringify(promptData, null, 2),
                            ].join("\n\n"),
                          },
                        ],
                      },
                    ],
                    max_output_tokens: 160,
                  }),
                });

                if (!response.ok) {
                  const errorText = await response.text();
                  core.warning(`Reply classification request failed (${response.status}): ${errorText.slice(0, 500)}`);
                  return fallbackReplyAnalysis(replies);
                }

                const responseJson = await response.json();
                const parsed = parseJsonObject(extractOutputText(responseJson));
                if (!parsed) {
                  core.warning("Reply classification response did not contain valid JSON; marking replies unclear.");
                  return fallbackReplyAnalysis(replies);
                }

                return normalizeReplyAnalysis(parsed, replies, "ai");
              } catch (error) {
                core.warning(`Reply classification request threw an error: ${error.message}`);
                return fallbackReplyAnalysis(replies);
              }
            }

            async function classifyDinnerReplyDays({ dayReplyGroups }) {
              const groupsWithReplies = dayReplyGroups.filter((group) => group.replies.length);
              if (!groupsWithReplies.length) {
                return {};
              }

              const apiKey = process.env.OPENAI_API_KEY;
              if (!apiKey) {
                core.info("OPENAI_API_KEY is not configured; historical reply statuses remain unclassified.");
                return {};
              }

              const systemPrompt = [
                "You classify target-user replies for multiple dinner reminder dates.",
                "Return only one JSON object and no surrounding text.",
                "Schema: {\"days\":[{\"date\":\"YYYY-MM-DD\",\"status\":\"confirmed|denied|unclear\",\"confirmed\":boolean,\"confirmationDate\":\"today|yesterday|unknown\",\"mealDescription\":string|null,\"confidence\":number,\"reason\":string}]}",
                "Each date is the dinner date being checked.",
                "Quoted GitHub reply text has been removed before you see the replies; classify only the target user's own words.",
                "Use confirmed only when the reply says the target ate, is eating, finished dinner, or gives concrete meal evidence.",
                "Use denied when the reply says they did not eat, skipped dinner, or have not eaten yet.",
                "Use unclear for jokes, acknowledgements, or anything without enough dinner evidence.",
              ].join("\n");

              const promptData = {
                timeZone: targetTimeZone,
                days: groupsWithReplies,
              };

              try {
                const baseUrl = (process.env.OPENAI_BASE_URL || "https://api.openai.com").replace(/\/+$/, "");
                const response = await fetch(`${baseUrl}/v1/responses`, {
                  method: "POST",
                  headers: {
                    Authorization: `Bearer ${apiKey}`,
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({
                    model: process.env.OPENAI_MODEL || "gpt-5.2",
                    input: [
                      {
                        role: "system",
                        content: [{ type: "input_text", text: systemPrompt }],
                      },
                      {
                        role: "user",
                        content: [
                          {
                            type: "input_text",
                            text: [
                              "Classify these dinner-date reply groups.",
                              JSON.stringify(promptData, null, 2),
                            ].join("\n\n"),
                          },
                        ],
                      },
                    ],
                    max_output_tokens: 900,
                  }),
                });

                if (!response.ok) {
                  const errorText = await response.text();
                  core.warning(`Historical reply classification request failed (${response.status}): ${errorText.slice(0, 500)}`);
                  return {};
                }

                const responseJson = await response.json();
                const parsed = parseJsonObject(extractOutputText(responseJson));
                if (!parsed || !Array.isArray(parsed.days)) {
                  core.warning("Historical reply classification response did not contain valid days JSON.");
                  return {};
                }

                const groupsByDate = new Map(groupsWithReplies.map((group) => [group.date, group]));
                const analyses = {};
                for (const day of parsed.days) {
                  const group = groupsByDate.get(day?.date);
                  if (group) {
                    analyses[group.date] = normalizeReplyAnalysis(day, group.replies, "ai-history");
                  }
                }

                return analyses;
              } catch (error) {
                core.warning(`Historical reply classification request threw an error: ${error.message}`);
                return {};
              }
            }

            async function buildAiReminder({ username, localDate, recentComments, confirmationSummary, dinnerState }) {
              const apiKey = process.env.OPENAI_API_KEY;
              if (!apiKey) {
                core.info("OPENAI_API_KEY is not configured; using fallback reminder.");
                return fallbackReminder(username, localDate, confirmationSummary);
              }

              const promptData = {
                target: {
                  username,
                  displayName: targetDisplayName,
                },
                localDate,
                confirmationSummary,
                dinnerState,
                recentComments,
              };

              const systemPrompt = [
                "You write one daily GitHub issue comment reminding a friend to eat dinner.",
                "Persona: you are Dinner Duty Bot, a persistent friend-shaped bot with a dry sense of humor and excellent memory.",
                "Your voice is playful, lightly sarcastic, and a little deadpan, like a friend who cares but refuses to be normal about dinner.",
                "Use gentle teasing, mock seriousness, tiny exaggerations, and mild side-eye. The humor should feel personal and conversational, not corporate.",
                "Do not overbuild an office, archive, paperwork, stamp, audit, or mission metaphor; use at most one such bit if it genuinely fits.",
                "The reminder should feel like a recurring character with memory, not a random joke generator and not a lecture.",
                `Mention @${username} exactly once.`,
                `Use the name ${targetDisplayName} at most once.`,
                "Be affectionate first and snarky second; never sound mean, bitter, disappointed, or controlling.",
                "Aim for one sharp joke plus one clear dinner nudge, not a paragraph of lore.",
                "Write like a mischievous, weirdly self-aware friend-bot: sharp-tongued, whimsical, and a little yin-yang-guai-qi, but still affectionate.",
                "For today's incident context, sound sheepish but still cheeky, like a bot trying to recover dignity after doing something stupid.",
                "Prefer one vivid, slightly odd image over mechanical tracking language.",
                "The apology text will be appended separately, so do not write another apology.",
                "Read dinnerState.stats and confirmationSummary.previousDayStatus before writing.",
                "The primary behavior is to react to the previous dinner date's target reply status, then remind for today's dinner.",
                "Use confirmationSummary.replyAnalysis as authoritative for whether the latest target reply confirmed dinner.",
                "If confirmationSummary.replyAnalysis.status is confirmed, acknowledge it with a playful backhanded compliment before today's reminder.",
                "If confirmationSummary.replyAnalysis.status is confirmed, do not say paperwork, proof, or confirmation is missing.",
                "If confirmationSummary.previousDayStatus.latestReplyBody exists, reference one small detail from it when it makes the comment feel personal.",
                "You may reference recent replies, the confirmed streak, or contextual frustrations like Lean 4 if the provided data supports it.",
                "If confirmationSummary shows no recent target replies or no dinner confirmation, make one gentle side-eye joke about the missing update, but do not scold, guilt, or sound disappointed.",
                "Vary the wording from prior reminders; avoid repeating cape, clipboard, paperwork, form, archive, office, or stamp jokes.",
                "Do not shame, guilt, diagnose, discuss body weight, or use medical framing.",
                "Do not imply surveillance. Do not use profanity.",
                "Keep it under 420 characters.",
                "Do not include markdown headings, code fences, links, or HTML comments.",
                "Default to English. Use tiny simple Chinese only if recent comments use Chinese.",
              ].join("\n");

              try {
                const baseUrl = (process.env.OPENAI_BASE_URL || "https://api.openai.com").replace(/\/+$/, "");
                const response = await fetch(`${baseUrl}/v1/responses`, {
                  method: "POST",
                  headers: {
                    Authorization: `Bearer ${apiKey}`,
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({
                    model: process.env.OPENAI_MODEL || "gpt-5.2",
                    input: [
                      {
                        role: "system",
                        content: [{ type: "input_text", text: systemPrompt }],
                      },
                      {
                        role: "user",
                        content: [
                          {
                            type: "input_text",
                            text: [
                              "Create today's dinner reminder from this context.",
                              JSON.stringify(promptData, null, 2),
                            ].join("\n\n"),
                          },
                        ],
                      },
                    ],
                    max_output_tokens: 220,
                  }),
                });

                if (!response.ok) {
                  const errorText = await response.text();
                  core.warning(`OpenAI request failed (${response.status}): ${errorText.slice(0, 500)}`);
                  return fallbackReminder(username, localDate, confirmationSummary);
                }

                const responseJson = await response.json();
                const aiText = sanitizeAiReminder(extractOutputText(responseJson), username);
                if (!aiText) {
                  core.warning("OpenAI response did not contain usable text; using fallback reminder.");
                  return fallbackReminder(username, localDate, confirmationSummary);
                }

                return aiText;
              } catch (error) {
                core.warning(`OpenAI request threw an error: ${error.message}`);
                return fallbackReminder(username, localDate, confirmationSummary);
              }
            }

            const localTime = formatTargetDate(now);
            const localDate = localTime.date;
            const incidentApologyDate = process.env.INCIDENT_APOLOGY_DATE || "";
            const incidentApologyText = process.env.INCIDENT_APOLOGY_TEXT || "";
            const incidentApology = localDate === incidentApologyDate
              ? incidentApologyText.trim()
              : "";

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const issueTitle = process.env.ISSUE_TITLE;
            const username = process.env.TARGET_USERNAME;
            const reminderMarker = `<!-- dinner-reminder:${localDate} -->`;

            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              throw new Error("ISSUE_NUMBER must be set to the stable reminder issue number.");
            }

            const existingIssue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber,
            });
            let reminderIssue = existingIssue.data;

            if (reminderIssue.pull_request) {
              throw new Error(`Configured ISSUE_NUMBER #${issueNumber} is a pull request, not an issue.`);
            }

            if (reminderIssue.title !== issueTitle) {
              core.warning(`Configured reminder issue #${issueNumber} has title "${reminderIssue.title}", expected "${issueTitle}".`);
            }

            if (reminderIssue.state === "closed") {
              const reopened = await github.rest.issues.update({
                owner,
                repo,
                issue_number: reminderIssue.number,
                state: "open",
              });
              reminderIssue = reopened.data;
              core.info(`Reopened reminder issue #${reminderIssue.number}`);
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: reminderIssue.number,
              per_page: 100,
            });

            const alreadyPosted = comments.some((comment) =>
              (comment.body || "").includes(reminderMarker),
            );

            if (alreadyPosted) {
              core.info(`Reminder already posted for ${localDate}`);
              return;
            }

            const usernameLower = username.toLowerCase();
            const yesterday = previousTargetDate(localDate);
            const targetComments = comments.filter(
              (comment) => (comment.user?.login || "").toLowerCase() === usernameLower,
            );
            const reminderComments = comments
              .filter((comment) => getReminderDate(comment.body))
              .sort((a, b) => getCommentTime(a) - getCommentTime(b));
            const latestReminderComment = reminderComments.at(-1);
            const latestReminderDate = latestReminderComment
              ? getReminderDate(latestReminderComment.body)
              : null;
            const latestReminderAt = latestReminderComment
              ? getCommentTime(latestReminderComment)
              : 0;
            const previousTargetReplies = targetComments
              .filter((comment) => getCommentTime(comment) > latestReminderAt)
              .map(compactComment);

            const savedStates = comments
              .map((comment) => ({
                state: getDinnerState(comment.body),
                time: getCommentTime(comment),
              }))
              .filter((entry) => entry.state)
              .sort((a, b) => a.time - b.time);
            const latestSavedState = savedStates.at(-1)?.state || null;
            const dinnerByDate = { ...(latestSavedState?.dinnerByDate || {}) };

            if (!latestSavedState) {
              const historicalReplyGroups = [];
              for (const [index, reminderComment] of reminderComments.entries()) {
                const reminderDate = getReminderDate(reminderComment.body);
                const start = getCommentTime(reminderComment);
                const end = reminderComments[index + 1]
                  ? getCommentTime(reminderComments[index + 1])
                  : Infinity;
                const repliesForReminder = targetComments
                  .filter((comment) => {
                    const time = getCommentTime(comment);
                    return time > start && time < end;
                  })
                  .map(compactComment);
                historicalReplyGroups.push({
                  date: reminderDate,
                  replies: repliesForReminder,
                });
              }

              const historicalAnalyses = await classifyDinnerReplyDays({
                dayReplyGroups: historicalReplyGroups.filter((group) =>
                  group.date !== latestReminderDate,
                ),
              });

              for (const group of historicalReplyGroups) {
                if (group.date === latestReminderDate) {
                  continue;
                }

                dinnerByDate[group.date] = summarizeDayStatus(
                  group.date,
                  group.replies,
                  historicalAnalyses[group.date] || null,
                );
              }
            }

            const replyAnalysis = await classifyDinnerReplies({
              localDate: latestReminderDate || yesterday,
              replies: previousTargetReplies,
            });
            core.info(`Reply analysis: ${JSON.stringify(replyAnalysis)}`);

            let previousDayStatus = null;
            if (latestReminderDate) {
              previousDayStatus = summarizeDayStatus(
                latestReminderDate,
                previousTargetReplies,
                replyAnalysis,
              );
              dinnerByDate[latestReminderDate] = previousDayStatus;
            }

            const confirmedDates = Object.entries(dinnerByDate)
              .filter(([, status]) => status?.status === "confirmed")
              .map(([date]) => date)
              .sort();
            const confirmedStreakDays = calculateConfirmedStreak(dinnerByDate, yesterday);

            const confirmationSummary = {
              checkedDinnerDate: latestReminderDate,
              yesterdayConfirmed: dinnerByDate[yesterday]?.status === "confirmed",
              confirmedDaysInRecentThread: confirmedDates.length,
              confirmedStreakDays,
              lastConfirmedDate: confirmedDates.at(-1) || null,
              targetReplyCount: targetComments.length,
              newTargetReplyCount: previousTargetReplies.length,
              previousDayStatus,
              replyAnalysis,
            };
            const dinnerState = {
              version: 1,
              updatedAt: now.toISOString(),
              localDate,
              checkedDinnerDate: latestReminderDate,
              dinnerByDate,
              stats: {
                totalTrackedDays: Object.keys(dinnerByDate).length,
                confirmedDays: confirmedDates.length,
